<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Man - สถิติหลังบ้าน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-6">

    <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center border border-slate-700">
        <h1 class="text-xl font-bold text-amber-400 mb-2">📊 สถิติระบบ Coin Man</h1>
        <p class="text-xs text-slate-400 mb-6">เฉพาะผู้พัฒนาระบบเท่านั้น (#RiderdevChan)</p>
        
        <div class="bg-slate-950/50 py-6 px-4 rounded-2xl border border-slate-800 mb-6">
            <p class="text-slate-400 text-xs uppercase tracking-wider mb-1">ยอดการกดติดตั้งสะสม</p>
            <div class="text-5xl font-extrabold text-cyan-400 flex justify-center items-center gap-2">
                <span id="downloadValue">...</span>
                <span class="text-3xl">📥</span>
            </div>
        </div>

        <button onclick="fetchLikes()" class="w-full bg-amber-500 hover:bg-amber-600 active:scale-98 text-slate-950 text-sm font-bold py-2.5 rounded-xl transition shadow-md">
            🔄 อัปเดตยอดล่าสุด
        </button>
    </div>

    <script>
        function fetchLikes() {
            const valueSpan = document.getElementById('downloadValue');
            valueSpan.innerText = '...';
            
            fetch('https://api.counterapi.dev/v1/coinman_riderdevchan/downloads')
                .then(res => res.json())
                .then(data => {
                    valueSpan.innerText = data.value || 0;
                })
                .catch(err => {
                    valueSpan.innerText = 'ข้อผิดพลาด';
                    console.error(err);
                });
        }
        // เรียกดูยอดทันทีที่เปิดหน้าเว็บ
        window.onload = fetchLikes;
    </script>
</body>
</html>
