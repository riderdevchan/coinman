<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>Coin Man</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col justify-between">

    <div class="w-full h-full flex flex-col bg-gray-50">
        
        <!-- ส่วนหัว (Header) -->
        <div class="bg-gradient-to-r from-yellow-500 to-amber-600 text-white shadow-md flex-none">
            <div class="py-3 text-center">
                <h1 class="text-2xl font-bold tracking-wide flex items-center justify-center gap-1">🪙 Coin Man</h1>
            </div>
        </div>

        <!-- ส่วนเนื้อหาหลัก -->
        <div class="px-5 py-3 flex-1 flex flex-col space-y-2 overflow-y-auto">
            
            <!-- ตั้งค่าเกณฑ์เงินประจำวัน -->
            <div class="bg-white rounded-2xl p-3 border border-gray-100 shadow-sm flex-none">
                <h2 class="text-xs font-semibold text-yellow-800 mb-2 flex items-center justify-between">
                    ⚙️ ตั้งค่าเกณฑ์เงินประจำวัน
                    <button onclick="document.getElementById('ocrInputAll').click()" class="bg-blue-500 text-white px-2 py-0.5 rounded text-[10px] font-bold shadow-sm active:scale-95">📸 สแกนจากรูป</button>
                    <input type="file" id="ocrInputAll" accept="image/*" multiple class="hidden" onchange="processOCRMultiple(event)">
                </h2>
                <div id="ocrStatus" class="text-[10px] text-blue-600 mb-2 hidden text-center italic">กำลังสแกนรูปภาพ... โปรดรอสักครู่</div>
                
                <!-- ชุดที่ 1: เกณฑ์จำนวนเหรียญ -->
                <div class="mb-1">
                    <span class="text-[11px] font-semibold text-amber-800">📊 เกณฑ์จำนวนเหรียญ</span>
                </div>
                <div class="grid grid-cols-3 gap-2 mb-3">
                    <div>
                        <label class="text-[10px] text-gray-500 block mb-0.5 text-center font-medium">หลุม 1</label>
                        <input type="number" id="target1" value="10" inputmode="numeric" class="w-full p-2 border border-gray-200 rounded-lg text-center font-bold text-amber-700 text-base focus:outline-yellow-500 bg-gray-50">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 block mb-0.5 text-center font-medium">หลุม 2</label>
                        <input type="number" id="target2" value="30" inputmode="numeric" class="w-full p-2 border border-gray-200 rounded-lg text-center font-bold text-gray-500 text-base focus:outline-yellow-500 bg-gray-50">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 block mb-0.5 text-center font-medium">หลุม 3</label>
                        <input type="number" id="target3" value="50" inputmode="numeric" class="w-full p-2 border border-gray-200 rounded-lg text-center font-bold text-yellow-600 text-base focus:outline-yellow-500 bg-gray-50">
                    </div>
                </div>

                <!-- ชุดที่ 2: เกณฑ์จำนวนเงิน -->
                <div class="mb-1 border-t border-gray-100 pt-2.5">
                    <span class="text-[11px] font-semibold text-blue-800">💰 เกณฑ์จำนวนเงิน (บาท)</span>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div>
                        <label class="text-[10px] text-gray-500 block mb-0.5 text-center font-medium">หลุม 1</label>
                        <input type="number" id="money1" value="300" inputmode="numeric" class="w-full p-2 border border-gray-200 rounded-lg text-center font-bold text-amber-700 text-base focus:outline-yellow-500 bg-gray-50">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 block mb-0.5 text-center font-medium">หลุม 2</label>
                        <input type="number" id="money2" value="395" inputmode="numeric" class="w-full p-2 border border-gray-200 rounded-lg text-center font-bold text-gray-500 text-base focus:outline-yellow-500 bg-gray-50">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 block mb-0.5 text-center font-medium">หลุม 3</label>
                        <input type="number" id="money3" value="435" inputmode="numeric" class="w-full p-2 border border-gray-200 rounded-lg text-center font-bold text-yellow-600 text-base focus:outline-yellow-500 bg-gray-50">
                    </div>
                </div>
                
                <div class="grid grid-cols-3 gap-2 mt-3">
                    <button onclick="updateSettings()" class="col-span-2 bg-yellow-600 hover:bg-yellow-700 text-white text-xs py-2 rounded-lg font-semibold transition active:scale-98 shadow-sm">
                        บันทึกเกณฑ์เงินและหลุม
                    </button>
                    <button onclick="resetCoins()" class="bg-rose-50 hover:bg-rose-100 text-rose-600 border border-rose-200 text-xs py-2 rounded-lg font-semibold transition active:scale-98 shadow-sm">
                        🔄 รีเซ็ต 0
                    </button>
                </div>
            </div>

            <!-- กล่องการ์ดครอบส่วนแสดงผลหลัก (เพิ่มฝั่งซ้ายเป็นจำนวนออเดอร์) -->
            <div class="bg-white border border-gray-100 rounded-2xl p-4 shadow-sm flex-none space-y-4">
                <div class="grid grid-cols-2 gap-4 border-b border-gray-100 pb-3">
                    <!-- ฝั่งซ้าย: ยอดออเดอร์สะสม -->
                    <div class="space-y-0.5 text-center border-r border-gray-100">
                        <p class="text-gray-400 text-xs uppercase tracking-wider font-semibold">ยอดออเดอร์สะสม</p>
                        <div class="text-6xl font-extrabold text-blue-600 flex justify-center items-center gap-2">
                            <span id="orderCount">0</span>
                            <span class="text-4xl">📦</span>
                        </div>
                    </div>
                    <!-- ฝั่งขวา: ยอดเหรียญสะสมรวม -->
                    <div class="space-y-0.5 text-center">
                        <p class="text-gray-400 text-xs uppercase tracking-wider font-semibold">ยอดเหรียญสะสมรวม</p>
                        <div class="text-6xl font-extrabold text-cyan-600 flex justify-center items-center gap-2">
                            <span id="coinCount">0</span>
                            <span class="text-4xl">🪙</span>
                        </div>
                    </div>
                </div>
                
                <div class="space-y-3 text-center">
                    <div>
                        <span id="levelBadge" class="inline-block px-5 py-2 rounded-full text-xl font-bold bg-gray-200 text-gray-700 shadow-sm">⚪ กำลังเริ่ม</span>
                    </div>
                    <div>
                        <div id="remainingPoints" class="text-xl font-bold text-emerald-600 bg-emerald-50 inline-block px-5 py-2 rounded-2xl border border-emerald-100 shadow-sm">
                            อีก 0 เหรียญ จะถึงหลุมถัดไป
                        </div>
                    </div>
                </div>

                <!-- ช่องสำหรับคีย์ค่าร่วม สลับรูปแบบอัตโนมัติ -->
                <div class="w-full pt-1">
                    <label id="inputLabel" class="text-[11px] font-semibold text-blue-500 block mb-1 text-left pl-1 transition-colors duration-200">📥 ขั้นที่ 1: ใส่จำนวนออเดอร์ของเคสนี้:</label>
                    <input type="number" id="inputCoins" placeholder="ใส่จำนวนออเดอร์..." inputmode="numeric" 
                           onkeydown="if(event.key==='Enter') handleCombinedInput()" 
                           class="w-full p-3.5 border-2 border-blue-500 rounded-xl text-center font-bold text-2xl text-gray-800 focus:outline-none bg-blue-50/30 shadow-inner transition-all duration-200">
                </div>

                <!-- Progress Bar + แฮชแท็ก -->
                <div class="space-y-1 pt-2">
                    <div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden relative shadow-inner">
                        <div id="progressBar" class="bg-gradient-to-r from-amber-500 via-gray-400 to-yellow-500 h-4 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                    <div class="flex justify-between text-[10px] text-gray-400 font-bold px-1">
                        <span>0</span>
                        <span id="lblT1" class="text-amber-700">10</span>
                        <span id="lblT2" class="text-gray-500">30</span>
                        <span id="lblT3" class="text-yellow-600">50+</span>
                    </div>
                    <div class="text-right pt-0.5">
                        <span class="text-[10px] text-slate-400 font-medium italic select-none">#RiderdevChan</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // สถานะปัจจุบันของช่องคีย์ข้อมูล ('order' = กรอกออเดอร์, 'coin' = กรอกเหรียญ)
        let currentInputMode = 'order'; 

        // ดึงข้อมูลสะสมเดิมจากเครื่อง
        let coins = parseInt(localStorage.getItem('savedCoins')) || 0;
        let orders = parseInt(localStorage.getItem('savedOrders')) || 0;

        let t1 = parseInt(localStorage.getItem('savedT1')) || 10;
        let t2 = parseInt(localStorage.getItem('savedT2')) || 30;
        let t3 = parseInt(localStorage.getItem('savedT3')) || 50;

        let m1 = parseInt(localStorage.getItem('savedM1')) || 300;
        let m2 = parseInt(localStorage.getItem('savedM2')) || 395;
        let m3 = parseInt(localStorage.getItem('savedM3')) || 435;

        // จัดการฟังก์ชันจัดการเมื่อกด Enter ที่ช่องคีย์ร่วม
        function handleCombinedInput() {
            const inputElement = document.getElementById('inputCoins');
            let typedValue = parseInt(inputElement.value);

            if (isNaN(typedValue) || typedValue <= 0) {
                inputElement.value = '';
                return;
            }

            if (currentInputMode === 'order') {
                // บันทึกออเดอร์
                orders += typedValue;
                localStorage.setItem('savedOrders', orders);
                
                // สลับโหมดเปลี่ยนไปรอรับเหรียญต่อทันที
                currentInputMode = 'coin';
                switchInputDesign();
            } else {
                // บันทึกเหรียญ
                coins += typedValue;
                localStorage.setItem('savedCoins', coins);
                
                // สลับโหมดดีดกลับมารอรับออเดอร์ของงานถัดไป
                currentInputMode = 'order';
                switchInputDesign();
            }

            updateUI();
            inputElement.value = '';
            inputElement.focus();
        }

        // ฟังก์ชันเปลี่ยนดีไซน์สลับสีช่องป้อนตามสถานะการคีย์
        function switchInputDesign() {
            const label = document.getElementById('inputLabel');
            const input = document.getElementById('inputCoins');

            if (currentInputMode === 'order') {
                label.innerText = "📥 ขั้นที่ 1: ใส่จำนวนออเดอร์ของเคสนี้:";
                label.className = "text-[11px] font-semibold text-blue-500 block mb-1 text-left pl-1 transition-colors duration-200";
                input.placeholder = "ใส่จำนวนออเดอร์...";
                input.className = "w-full p-3.5 border-2 border-blue-500 rounded-xl text-center font-bold text-2xl text-gray-800 focus:outline-none bg-blue-50/30 shadow-inner transition-all duration-200";
            } else {
                label.innerText = "📥 ขั้นที่ 2: ใส่จำนวนเหรียญที่ได้จากออเดอร์เมื่อกี้:";
                label.className = "text-[11px] font-semibold text-emerald-500 block mb-1 text-left pl-1 transition-colors duration-200";
                input.placeholder = "ใส่จำนวนเหรียญ...";
                input.className = "w-full p-3.5 border-2 border-emerald-500 rounded-xl text-center font-bold text-2xl text-gray-800 focus:outline-none bg-emerald-50/30 shadow-inner transition-all duration-200";
            }
        }

        // ระบบ AI OCR สแกนรูปภาพคู่
        async function processOCRMultiple(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            const status = document.getElementById('ocrStatus');
            status.classList.remove('hidden');
            let updatedTarget = false, updatedMoney = false;

            try {
                for (let i = 0; i < Math.min(files.length, 2); i++) {
                    status.innerText = `กำลังสแกนรูปภาพใบที่ ${i + 1}/${Math.min(files.length, 2)}...`;
                    const { data: { text } } = await Tesseract.recognize(files[i], 'eng');
                    const numbers = text.match(/\d{2,4}/g);

                    if (numbers && numbers.length >= 3) {
                        if (i === 0) {
                            document.getElementById('target1').value = numbers[0];
                            document.getElementById('target2').value = numbers[1];
                            document.getElementById('target3').value = numbers[2];
                            updatedTarget = true;
                        } else if (i === 1) {
                            document.getElementById('money1').value = numbers[0];
                            document.getElementById('money2').value = numbers[1];
                            document.getElementById('money3').value = numbers[2];
                            updatedMoney = true;
                        }
                    }
                }
                if (updatedTarget && updatedMoney) alert('✅ สแกนสำเร็จครบถ้วน: อัปเดตเกณฑ์ทั้งหมดแล้วครับ!');
                else if (updatedTarget) alert('✅ สแกนรูปแรกสำเร็จ: อัปเดตเกณฑ์รอบแถวบนเรียบร้อยครับ');
                updateSettings();
            } catch (err) {
                alert('เกิดข้อผิดพลาดในการประมวลผลรูปภาพ');
            } finally {
                status.classList.add('hidden');
                event.target.value = '';
            }
        }

        document.getElementById('target1').value = t1;
        document.getElementById('target2').value = t2;
        document.getElementById('target3').value = t3;
        document.getElementById('money1').value = m1;
        document.getElementById('money2').value = m2;
        document.getElementById('money3').value = m3;

        window.onload = function() { document.getElementById('inputCoins').focus(); };

        function updateSettings() {
            t1 = parseInt(document.getElementById('target1').value) || 0;
            t2 = parseInt(document.getElementById('target2').value) || 0;
            t3 = parseInt(document.getElementById('target3').value) || 0;
            m1 = parseInt(document.getElementById('money1').value) || 0;
            m2 = parseInt(document.getElementById('money2').value) || 0;
            m3 = parseInt(document.getElementById('money3').value) || 0;

            if (t1 >= t2 || t2 >= t3) { alert('⚠️ เกณฑ์การตั้งค่าจำนวนหลุมไม่ถูกต้อง'); return; }

            localStorage.setItem('savedT1', t1);
            localStorage.setItem('savedT2', t2);
            localStorage.setItem('savedT3', t3);
            localStorage.setItem('savedM1', m1);
            localStorage.setItem('savedM2', m2);
            localStorage.setItem('savedM3', m3);

            updateUI();
        }

        function resetCoins() {
            if (confirm('รีเซ็ตล้างยอดข้อมูลสะสม (ทั้งออเดอร์และเหรียญ) ให้เป็น 0 ใช่หรือไม่?')) {
                coins = 0;
                orders = 0;
                localStorage.setItem('savedCoins', coins);
                localStorage.setItem('savedOrders', orders);
                currentInputMode = 'order';
                switchInputDesign();
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('coinCount').innerText = coins;
            document.getElementById('orderCount').innerText = orders;
            document.getElementById('lblT1').innerText = t1;
            document.getElementById('lblT2').innerText = t2;
            document.getElementById('lblT3').innerText = t3 + '+';

            let percentage = 0;
            if (coins <= t1) percentage = (coins / t1) * 33.33;
            else if (coins <= t2) percentage = 33.33 + ((coins - t1) / (t2 - t1)) * 33.33;
            else if (coins <= t3) percentage = 66.66 + ((coins - t2) / (t3 - t2)) * 33.34;
            else percentage = 100;

            document.getElementById('progressBar').style.width = Math.min(percentage, 100) + '%';

            const badge = document.getElementById('levelBadge');
            const remText = document.getElementById('remainingPoints');
            
            if (coins >= t3) {
                badge.className = "inline-block px-6 py-2 rounded-full text-xl font-bold bg-yellow-500 text-white animate-bounce shadow-sm";
                badge.innerText = `🏆 หลุม 3 เงินสะสม: ${m3} บาท`;
                remText.className = "text-xl font-bold text-yellow-600 bg-yellow-50 inline-block px-5 py-2.5 rounded-2xl border border-yellow-100 shadow-sm";
                remText.innerText = "🎉 สำเร็จเป้าหมายสูงสุดแล้ว!";
            } else if (coins >= t2) {
                badge.className = "inline-block px-6 py-2 rounded-full text-xl font-bold bg-gray-400 text-white shadow-sm";
                badge.innerText = `🥈 หลุม 2 เงินสะสม: ${m2} บาท`;
                remText.className = "text-xl font-bold text-amber-600 bg-amber-50 inline-block px-5 py-2.5 rounded-2xl border border-amber-100 shadow-sm";
                remText.innerText = `อีก 🪙 ${t3 - coins} เหรียญ จะถึง หลุม 3 (${m3} บ.)`;
            } else if (coins >= t1) {
                badge.className = "inline-block px-6 py-2 rounded-full text-xl font-bold bg-amber-600 text-white shadow-sm";
                badge.innerText = `🥉 หลุม 1 เงินสะสม: ${m1} บาท`;
                remText.className = "text-xl font-bold text-gray-600 bg-gray-50 inline-block px-5 py-2.5 rounded-2xl border border-gray-100 shadow-sm";
                remText.innerText = `อีก 🪙 ${t2 - coins} เหรียญ จะถึง หลุม 2 (${m2} บ.)`;
            } else {
                badge.className = "inline-block px-6 py-2 rounded-full text-xl font-bold bg-gray-200 text-gray-700 shadow-sm";
                badge.innerText = "⚪ กำลังเดินทางไปหลุมแรก";
                remText.className = "text-xl font-bold text-emerald-600 bg-emerald-50 inline-block px-5 py-2.5 rounded-2xl border border-emerald-100 shadow-sm";
                remText.innerText = `อีก 🪙 ${t1 - coins} เหรียญ จะถึง หลุม 1 (${m1} บ.)`;
            }
        }
        updateUI();
    </script>
</body>
</html>
